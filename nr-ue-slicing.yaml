services:
  nr_ue:
    image: docker_ueransim
    container_name: nr_ue
    stdin_open: true
    tty: true
    volumes:
      - ../ueransim:/mnt/ueransim
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ../.env
    environment:
      - COMPONENT_NAME=ueransim-ue
    cap_add:
      - NET_ADMIN
    privileged: true
    # Isola o UE na rede do docker em vez da do Host = Roteamento Obrigatório
    networks:
      default:
        ipv4_address: ${NR_UE_IP}
networks:
  default:
    external: true
    name: docker_open5gs_default
